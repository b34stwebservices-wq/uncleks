<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Lightning bolt / Fast service -->
  <defs>
    <linearGradient id="fastGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="white"/>
  
  <!-- Lightning bolt -->
  <polygon points="100,20 75,90 100,90 70,180 130,100 105,100 130,20" fill="url(#fastGrad)"/>
  
  <!-- Speed lines -->
  <line x1="30" y1="60" x2="50" y2="60" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  <line x1="25" y1="85" x2="45" y2="85" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  <line x1="150" y1="70" x2="170" y2="70" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="110" x2="175" y2="110" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Timer circle -->
  <circle cx="100" cy="170" r="15" stroke="#4CAF50" stroke-width="3" fill="none"/>
  <line x1="100" y1="160" x2="100" y2="170" stroke="#4CAF50" stroke-width="2"/>
  <line x1="100" y1="170" x2="108" y2="170" stroke="#4CAF50" stroke-width="2"/>
</svg>