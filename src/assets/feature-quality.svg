<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Quality/Hands icon -->
  <defs>
    <linearGradient id="qualityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="white"/>
  
  <!-- Left hand -->
  <ellipse cx="70" cy="100" rx="25" ry="45" fill="url(#qualityGrad)"/>
  <circle cx="55" cy="60" r="12" fill="url(#qualityGrad)"/>
  <circle cx="70" cy="50" r="12" fill="url(#qualityGrad)"/>
  <circle cx="85" cy="60" r="12" fill="url(#qualityGrad)"/>
  
  <!-- Right hand -->
  <ellipse cx="130" cy="100" rx="25" ry="45" fill="url(#qualityGrad)"/>
  <circle cx="145" cy="60" r="12" fill="url(#qualityGrad)"/>
  <circle cx="130" cy="50" r="12" fill="url(#qualityGrad)"/>
  <circle cx="115" cy="60" r="12" fill="url(#qualityGrad)"/>
  
  <!-- Product in center -->
  <rect x="85" y="110" width="30" height="50" rx="5" fill="#E53935"/>
  <circle cx="100" cy="130" r="8" fill="#FF6F00"/>
  
  <!-- Stars -->
  <polygon points="100,20 105,35 120,35 110,43 115,58 100,50 85,58 90,43 80,35 95,35" fill="#FFD700"/>
</svg>