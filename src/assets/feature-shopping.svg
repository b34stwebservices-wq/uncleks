<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shopping cart -->
  <defs>
    <linearGradient id="shoppingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="white"/>
  
  <!-- Cart body -->
  <path d="M 50 80 L 60 140 Q 65 150 75 150 L 125 150 Q 135 150 140 140 L 150 80" stroke="url(#shoppingGrad)" stroke-width="4" fill="none"/>
  <rect x="50" y="75" width="100" height="10" rx="2" fill="url(#shoppingGrad)"/>
  
  <!-- Cart wheels -->
  <circle cx="70" cy="155" r="8" fill="url(#shoppingGrad)"/>
  <circle cx="120" cy="155" r="8" fill="url(#shoppingGrad)"/>
  
  <!-- Products in cart -->
  <rect x="65" y="95" width="20" height="25" fill="#E53935" rx="2"/>
  <rect x="95" y="100" width="18" height="20" fill="#FFD700" rx="2"/>
  <rect x="120" y="98" width="15" height="22" fill="#FF6F00" rx="2"/>
  
  <!-- Checkmark -->
  <path d="M 100 35 L 110 45 L 130 25" stroke="#4CAF50" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>