<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Hero image: Spice blends -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E53935;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#FFF3E0"/>
  
  <!-- Jar 1 -->
  <rect x="50" y="80" width="80" height="140" rx="5" fill="#D4A574"/>
  <rect x="50" y="60" width="80" height="25" rx="3" fill="#8B6F47"/>
  <ellipse cx="90" cy="60" rx="40" ry="8" fill="#A0826D"/>
  
  <!-- Spices in jar 1 -->
  <circle cx="70" cy="140" r="5" fill="#8B0000"/>
  <circle cx="95" cy="130" r="4" fill="#FF4500"/>
  <circle cx="85" cy="150" r="3" fill="#DC143C"/>
  
  <!-- Jar 2 -->
  <rect x="160" y="100" width="80" height="120" rx="5" fill="#D4A574"/>
  <rect x="160" y="80" width="80" height="25" rx="3" fill="#8B6F47"/>
  <ellipse cx="200" cy="80" rx="40" ry="8" fill="#A0826D"/>
  
  <!-- Spices in jar 2 -->
  <circle cx="180" cy="150" r="5" fill="#DAA520"/>
  <circle cx="210" cy="145" r="4" fill="#FFD700"/>
  
  <!-- Jar 3 -->
  <rect x="270" y="90" width="80" height="130" rx="5" fill="#D4A574"/>
  <rect x="270" y="70" width="80" height="25" rx="3" fill="#8B6F47"/>
  <ellipse cx="310" cy="70" rx="40" ry="8" fill="#A0826D"/>
  
  <!-- Spices in jar 3 -->
  <circle cx="290" cy="140" r="5" fill="#228B22"/>
  <circle cx="320" cy="135" r="4" fill="#32CD32"/>
  
  <!-- Text -->
  <text x="200" y="280" font-size="24" font-weight="bold" text-anchor="middle" fill="#1B5E20">Premium Spices</text>
</svg>